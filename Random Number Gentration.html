<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Number</title>
</head>
<body>

<button onclick="gen()">Generation</button>
<p id="num"></p>

<script>
    function gen() {
        let n = Math.floor(Math.random() * 100);
        document.getElementById("num").innerHTML = n;
    }
</script>

</body>
</html>
